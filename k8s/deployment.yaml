apiVersion: apps/v1
kind: Deployment
metadata:
  name: gnosis-api
  namespace: gnosis-api
  labels:
    app: gnosis-api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gnosis-api
  template:
    metadata:
      labels:
        app: gnosis-api
    spec:
      containers:
        - name: gnosis-api
          image: ghcr.io/spearssoftware/gnosis-api:v1.0.1
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: GNOSIS_KEYS_DB_PATH
              value: /app/persist/keys.db
          envFrom:
            - secretRef:
                name: gnosis-api-secret
          volumeMounts:
            - name: keys-data
              mountPath: /app/persist
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "2Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 5
      volumes:
        - name: keys-data
          persistentVolumeClaim:
            claimName: gnosis-api-keys
