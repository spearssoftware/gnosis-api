apiVersion: apps/v1
kind: Deployment
metadata:
  name: gnosis-api
  namespace: gnosis-api
  labels:
    app: gnosis-api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gnosis-api
  template:
    metadata:
      labels:
        app: gnosis-api
    spec:
      containers:
        - name: gnosis-api
          image: ghcr.io/spearssoftware/gnosis-api:sha-4ce17c7d37a50f9cf4ad4f5ed29c60df7ad55e04
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: GNOSIS_KEYS_DB_PATH
              value: /app/persist/keys.db
          envFrom:
            - secretRef:
                name: gnosis-api-secret
          volumeMounts:
            - name: keys-data
              mountPath: /app/persist
          resources:
            requests:
              memory: "512Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
      volumes:
        - name: keys-data
          persistentVolumeClaim:
            claimName: gnosis-api-keys
