apiVersion: apps/v1
kind: Deployment
metadata:
  name: gnosis-api
  namespace: gnosis-api
  labels:
    app: gnosis-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gnosis-api
  template:
    metadata:
      labels:
        app: gnosis-api
    spec:
      containers:
        - name: gnosis-api
          image: ghcr.io/spearssoftware/gnosis-api:sha-78724bf54653746e9d1ff9a104bf336cbb7cb6a2
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - secretRef:
                name: gnosis-api-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
