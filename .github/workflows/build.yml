name: Build and Push

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download gnosis.db from latest release
        run: |
          mkdir -p data
          gh release download --repo spearssoftware/gnosis --pattern gnosis.db --dir data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Run tests
        run: |
          uv sync
          uv run pytest -x

      - name: Log in to Gitea registry
        uses: docker/login-action@v3
        with:
          registry: git.thespears.net
          username: kspears
          password: ${{ secrets.GITEA_REGISTRY_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: git.thespears.net/kspears/gnosis-api:latest
