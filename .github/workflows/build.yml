name: Build and Push

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download gnosis.db from latest release
        run: |
          mkdir -p data
          gh release download --repo spearssoftware/gnosis --pattern gnosis.db --dir data
          gh release download --repo spearssoftware/gnosis --pattern gnosis.usearch --dir data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/spearssoftware/gnosis-api:${{ github.event.release.tag_name || 'latest' }}
            ghcr.io/spearssoftware/gnosis-api:latest
