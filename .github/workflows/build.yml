name: Build and Push

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download gnosis.db from latest release
        run: |
          mkdir -p data
          gh release download --repo spearssoftware/gnosis --pattern gnosis.db --dir data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Run tests
        run: |
          uv sync
          uv run pytest -x

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/spearssoftware/gnosis-api:sha-${{ github.sha }}
            ghcr.io/spearssoftware/gnosis-api:latest

      - name: Update deployment manifest with new image tag
        run: |
          sed -i "s|image: ghcr.io/spearssoftware/gnosis-api:.*|image: ghcr.io/spearssoftware/gnosis-api:sha-${{ github.sha }}|" k8s/deployment.yaml

      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/deployment.yaml
          git diff --cached --quiet && exit 0
          git commit -m "Update image tag to sha-${{ github.sha }}"
          git push
